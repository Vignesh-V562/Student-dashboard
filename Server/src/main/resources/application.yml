spring:
  application:
    name: student-dashboard-server
  
  profiles:
    active: dev

  h2:
    console:
      enabled: true
      path: /h2-console

  datasource:
    url: jdbc:h2:mem:studentdb;DB_CLOSE_DELAY=-1
    username: sa
    password: password
    driver-class-name: org.h2.Driver

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: false
    locations: classpath:db/migration

server:
  port: 8080

logging:
  level:
    org.springframework.security: DEBUG
    com.student.dashboard.server: DEBUG

# Security Properties (Custom)
app:
  jwt:
    secret: ${APP_JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
    expiration-ms: ${APP_JWT_EXPIRATION_MS:3600000}
    refresh-expiration-ms: 86400000
  cors:
    allowed-origins: ${APP_CORS_ORIGINS:http://localhost:5173,http://localhost:3000}